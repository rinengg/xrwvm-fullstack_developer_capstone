name: CI - Lint and Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint-python:
    name: Lint Python (Django)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8
          pip install -r server/requirements.txt

      - name: Run flake8
        run: |
          flake8 server/djangoapp --max-line-length=120 --exclude=migrations

  lint-node:
    name: Lint Node.js (Express)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install dependencies
        working-directory: server/database
        run: npm install

      - name: Run ESLint
        working-directory: server/database
        run: npx eslint app.js --no-eslintrc -c '{"env":{"node":true,"es2021":true},"rules":{"no-unused-vars":"warn"}}'
        continue-on-error: true
